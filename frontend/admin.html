<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CP Leaderboard Admin</title>
  <style>
    :root {
      --bg: #050606;
      --panel: #0b0e0e;
      --cyan: #00f2ea;
      --orange: #f7941e;
      --text: #d7ecec;
      --muted: rgba(215,236,236,0.75);
      --border: rgba(0,242,234,0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at 20% 10%, rgba(0,242,234,0.08), transparent 40%),
                  radial-gradient(circle at 85% 0%, rgba(247,148,30,0.12), transparent 36%),
                  var(--bg);
      color: var(--text);
      font-family: "Fira Code", monospace;
      min-height: 100vh;
      padding: 0;
    }

    .shell {
      width: 100%;
      min-height: 100vh;
      border: 1px solid var(--border);
      background: rgba(8,10,10,0.92);
      padding: 22px;
      box-shadow: 0 0 28px rgba(0,242,234,0.08);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 72px;
    }

    .brand-logo {
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(0,242,234,0.18));
      flex-shrink: 0;
    }

    .brand-logo-c3 {
      width: 72px;
      height: 72px;
    }

    .brand-logo-nm {
      width: auto;
      height: 56px;
      max-width: 260px;
    }

    .brand-divider {
      width: 1px;
      height: 56px;
      background: rgba(255,255,255,0.5);
      box-shadow: 0 0 8px rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 0.72rem;
    }

    .panel {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 16px;
    }

    .login-panel {
      border: none;
      background: transparent;
      padding: 6px 0 0;
    }

    .login-hero {
      text-align: center;
      padding: 34px 12px 14px;
    }

    .login-title {
      font-size: clamp(2rem, 7vw, 4.5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.05;
      color: #ffffff;
    }

    .login-title .accent {
      color: var(--cyan);
    }

    .login-sub {
      margin-top: 12px;
      font-size: 0.8rem;
      color: rgba(214,234,234,0.78);
      letter-spacing: 0.09em;
    }

    .mock-login-wrap {
      display: flex;
      justify-content: center;
      padding: 18px 14px 0;
    }

    .mock-login-browser {
      width: min(620px, 100%);
      border: 1px solid var(--border);
      background: #080808;
      box-shadow: 0 0 80px rgba(0,242,234,0.06), 0 0 0 1px rgba(0,242,234,0.06);
    }

    .mock-login-titlebar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #111;
      border-bottom: 1px solid var(--border);
    }

    .mock-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .mock-dot.red { background: #ff5f57; }
    .mock-dot.yellow { background: #febc2e; }
    .mock-dot.green { background: #28c840; }

    .mock-login-url {
      margin-left: 12px;
      font-size: 0.64rem;
      color: rgba(210,230,230,0.78);
      letter-spacing: 0.08em;
    }

    .mock-login-body {
      padding: 24px 24px 18px;
    }

    .hidden { display: none; }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field label {
      color: var(--cyan);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
    }

    .field input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 10px 11px;
      font-family: "Fira Code", monospace;
    }

    .login-panel .field input {
      border-color: rgba(0,242,234,0.22);
      background: rgba(0,242,234,0.05);
    }

    .btn {
      border: 1px solid rgba(0,242,234,0.45);
      background: rgba(0,242,234,0.12);
      color: var(--cyan);
      padding: 9px 14px;
      font-family: "Fira Code", monospace;
      cursor: pointer;
    }

    .btn:hover {
      background: rgba(0,242,234,0.2);
    }

    .login-submit {
      width: 100%;
      padding: 12px;
      letter-spacing: 0.15em;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .status {
      margin-top: 10px;
      min-height: 19px;
      color: var(--muted);
      font-size: 0.72rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-input {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 8px 10px;
      font-family: "Fira Code", monospace;
      font-size: 0.72rem;
      min-width: 220px;
    }

    .filter-select {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 8px 10px;
      font-family: "Fira Code", monospace;
      font-size: 0.72rem;
      min-width: 140px;
    }

    .filter-select option {
      background: #0b1f3a;
      color: #d7ecec;
    }

    .filter-select option:checked {
      background: #153a72;
      color: #ffffff;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .student-row {
      cursor: pointer;
      transition: background 0.16s ease;
    }

    .student-row:hover {
      background: rgba(0,242,234,0.08);
    }

    .student-row.active {
      background: rgba(0,242,234,0.14);
    }

    .submissions-panel {
      margin-top: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      padding: 12px;
    }

    .submissions-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .submissions-title {
      color: var(--cyan);
      font-size: 0.74rem;
      letter-spacing: 0.08em;
    }

    .submissions-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .submissions-col {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2);
      padding: 10px;
      min-height: 120px;
    }

    .submissions-col h4 {
      margin: 0 0 8px;
      font-size: 0.72rem;
      color: var(--cyan);
      letter-spacing: 0.08em;
    }

    .submissions-list {
      max-height: 260px;
      overflow: auto;
      display: grid;
      gap: 8px;
      font-size: 0.69rem;
      color: var(--muted);
    }

    .submission-item {
      border-bottom: 1px dashed rgba(255,255,255,0.1);
      padding-bottom: 6px;
    }

    .submission-name {
      color: #ffffff;
      margin-bottom: 2px;
    }

    .submission-meta {
      color: var(--muted);
      font-size: 0.66rem;
      line-height: 1.45;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      text-align: left;
      font-size: 0.73rem;
      white-space: nowrap;
    }

    th {
      color: var(--cyan);
      letter-spacing: 0.08em;
      font-weight: 600;
      background: rgba(0,242,234,0.05);
    }

    .name-col { color: #ffffff; }
    .cf-col { color: #f7941e; }
    .lc-col { color: #ffa116; }
    .total-col { color: var(--cyan); }

    @media (max-width: 740px) {
      .shell {
        padding: 14px;
      }

      .brand {
        gap: 8px;
        min-height: 56px;
      }

      .brand-logo-c3 {
        width: 56px;
        height: 56px;
      }

      .brand-logo-nm {
        width: auto;
        height: 42px;
        max-width: 190px;
      }

      .brand-divider {
        height: 42px;
      }

      .login-title {
        white-space: normal;
      }

      .submissions-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand" aria-label="CP Leaderboard Brand">
        <img src="./asset/c3logo.png" alt="C3 Logo" class="brand-logo brand-logo-c3" />
        <span class="brand-divider" aria-hidden="true"></span>
        <img src="./asset/nmlogo.png" alt="NM Logo" class="brand-logo brand-logo-nm" />
      </div>
      <div class="meta" id="adminMeta">NOT LOGGED IN</div>
    </div>

    <div class="panel login-panel" id="loginPanel">
      <div class="login-hero">
        <div class="login-title">ADMIN <span class="accent">DASHBOARD</span></div>
        <div class="login-sub">AUTHENTICATED ACCESS TO STUDENT LEADERBOARD DATA</div>
      </div>

      <div class="mock-login-wrap">
        <div class="mock-login-browser">
          <div class="mock-login-titlebar">
            <span class="mock-dot red"></span>
            <span class="mock-dot yellow"></span>
            <span class="mock-dot green"></span>
            <span class="mock-login-url">cp-leaderboard.local/admin-auth</span>
          </div>

          <div class="mock-login-body">
            <div class="field">
              <label for="adminId">ADMIN ID</label>
              <input id="adminId" type="text" autocomplete="username" />
            </div>
            <div class="field">
              <label for="adminPassword">PASSWORD</label>
              <input id="adminPassword" type="password" autocomplete="current-password" />
            </div>
            <button class="btn login-submit" id="loginBtn" type="button">LOGIN</button>
            <div class="status" id="loginStatus"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel hidden" id="dashboardPanel">
      <div class="actions">
        <button class="btn" id="refreshBtn" type="button">REFRESH DATA</button>
        <button class="btn" id="logoutBtn" type="button">LOGOUT</button>
        <select id="semesterFilter" class="filter-select" aria-label="Filter by semester">
          <option value="all">ALL SEMESTERS</option>
        </select>
        <div class="search-wrap">
          <input id="searchInput" class="search-input" type="text" placeholder="Search by name, handle, or SAP ID" />
        </div>
        <div class="meta" id="weekLabel">WEEK: --</div>
      </div>
      <div class="status" id="dashboardStatus"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>NAME</th>
              <th>SEMESTER</th>
              <th>SAP ID</th>
              <th>CF HANDLE</th>
              <th>LC HANDLE</th>
              <th>CF POINTS</th>
              <th>LC POINTS</th>
              <th>TOTAL</th>
              <th>WEEKLY</th>
            </tr>
          </thead>
          <tbody id="studentsBody">
            <tr><td colspan="10">NO DATA</td></tr>
          </tbody>
        </table>
      </div>

      <div class="submissions-panel hidden" id="submissionsPanel">
        <div class="submissions-head">
          <div class="submissions-title" id="submissionsTitle">SELECT A STUDENT TO VIEW SUBMISSIONS</div>
          <div class="meta" id="submissionsMeta"></div>
        </div>
        <div class="status" id="submissionsStatus"></div>
        <div class="submissions-grid">
          <div class="submissions-col">
            <h4>CODEFORCES SUBMISSIONS</h4>
            <div id="cfSubmissionsList" class="submissions-list"></div>
          </div>
          <div class="submissions-col">
            <h4>LEETCODE SUBMISSIONS</h4>
            <div id="lcSubmissionsList" class="submissions-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://pzrfvuckvmhuzyanqhra.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_4aXfr9YIQvHLnGMroTFBBQ_VLyHefA7";
    const ADMIN_TOKEN_KEY = "cp_admin_session_token";
    const ADMIN_ID_KEY = "cp_admin_id";
    const ADMIN_REDIRECT_NOTICE_KEY = "cp_admin_redirect_notice";

    const loginPanel = document.getElementById("loginPanel");
    const dashboardPanel = document.getElementById("dashboardPanel");
    const adminMeta = document.getElementById("adminMeta");
    const dashboardStatus = document.getElementById("dashboardStatus");
    const studentsBody = document.getElementById("studentsBody");
    const weekLabel = document.getElementById("weekLabel");
    const semesterFilter = document.getElementById("semesterFilter");
    const searchInput = document.getElementById("searchInput");
    const submissionsPanel = document.getElementById("submissionsPanel");
    const submissionsTitle = document.getElementById("submissionsTitle");
    const submissionsMeta = document.getElementById("submissionsMeta");
    const submissionsStatus = document.getElementById("submissionsStatus");
    const cfSubmissionsList = document.getElementById("cfSubmissionsList");
    const lcSubmissionsList = document.getElementById("lcSubmissionsList");

    const adminState = {
      payload: null,
      selectedSemester: "all",
      searchQuery: "",
      selectedUserId: null,
      submissionsCache: {},
    };

    function getSessionToken() {
      return localStorage.getItem(ADMIN_TOKEN_KEY);
    }

    function clearSession() {
      localStorage.removeItem(ADMIN_ID_KEY);
      localStorage.removeItem(ADMIN_TOKEN_KEY);
    }

    function redirectToMainLogin(message = "") {
      if (message) {
        sessionStorage.setItem(ADMIN_REDIRECT_NOTICE_KEY, message);
      }
      window.location.href = "./index.html";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function callFunction(functionName, options = {}) {
      const response = await fetch(`${SUPABASE_URL}/functions/v1/${functionName}`, {
        method: options.method || "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY,
          ...(options.token ? { Authorization: `Bearer ${options.token}` } : {}),
        },
        body: options.body ? JSON.stringify(options.body) : undefined,
      });

      let payload = null;
      try {
        payload = await response.json();
      } catch {}

      if (!response.ok) {
        throw new Error(payload?.error || `Request failed (${response.status})`);
      }

      return payload;
    }

    function showDashboard(adminId) {
      adminMeta.textContent = `LOGGED IN AS: ${adminId}`;
      loginPanel.classList.add("hidden");
      dashboardPanel.classList.remove("hidden");
    }

    function showLogin(message = "") {
      redirectToMainLogin(message);
    }

    function normalizeSemester(value) {
      if (value === null || value === undefined || value === "") {
        return "-";
      }

      return String(value);
    }

    function populateSemesterFilter(students) {
      const semesterValues = Array.from(
        new Set(students.map((student) => normalizeSemester(student.semester)))
      ).sort((a, b) => {
        if (a === "-") return 1;
        if (b === "-") return -1;
        return Number(a) - Number(b);
      });

      semesterFilter.innerHTML = '<option value="all">ALL SEMESTERS</option>';

      semesterValues.forEach((semester) => {
        const option = document.createElement("option");
        option.value = semester;
        option.textContent = semester === "-" ? "NO SEMESTER" : `SEM ${semester}`;
        semesterFilter.appendChild(option);
      });

      if (
        adminState.selectedSemester !== "all" &&
        !semesterValues.includes(adminState.selectedSemester)
      ) {
        adminState.selectedSemester = "all";
      }

      semesterFilter.value = adminState.selectedSemester;
    }

    function getFilteredStudents(students) {
      const semesterFiltered = adminState.selectedSemester === "all"
        ? students
        : students.filter(
            (student) => normalizeSemester(student.semester) === adminState.selectedSemester
          );

      const query = adminState.searchQuery.trim().toLowerCase();
      if (!query) {
        return semesterFiltered;
      }
      return semesterFiltered.filter((student) => {
        const fullName = String(student.full_name || "").toLowerCase();
        const sapId = String(student.sap_id || "").toLowerCase();
        const cfHandle = String(student.codeforces_handle || "").toLowerCase();
        const lcHandle = String(student.leetcode_handle || "").toLowerCase();
        return (
          fullName.includes(query) ||
          sapId.includes(query) ||
          cfHandle.includes(query) ||
          lcHandle.includes(query)
        );
      });
    }

    function renderStudents() {
      const payload = adminState.payload;
      const students = payload?.students || [];
      const latestWeek = payload?.latest_week;
      const filteredStudents = getFilteredStudents(students);

      if (latestWeek?.week_start && latestWeek?.week_end) {
        weekLabel.textContent = `WEEK: ${latestWeek.week_start} -> ${latestWeek.week_end}`;
      } else {
        weekLabel.textContent = "WEEK: NO WEEKLY DATA";
      }

      if (filteredStudents.length === 0) {
        studentsBody.innerHTML = '<tr><td colspan="10">NO STUDENTS FOUND FOR THIS SEMESTER</td></tr>';
        return;
      }

      studentsBody.innerHTML = filteredStudents.map((student, index) => {
        const name = escapeHtml(student.full_name || "-");
        const semester = escapeHtml(student.semester ?? "-");
        const sapId = escapeHtml(student.sap_id || "-");
        const cfHandle = escapeHtml(student.codeforces_handle || "-");
        const lcHandle = escapeHtml(student.leetcode_handle || "-");

        return `
          <tr class="student-row ${adminState.selectedUserId === student.user_id ? "active" : ""}" data-user-id="${student.user_id}">
            <td>${index + 1}</td>
            <td class="name-col">${name}</td>
            <td>${semester}</td>
            <td>${sapId}</td>
            <td>${cfHandle}</td>
            <td>${lcHandle}</td>
            <td class="cf-col">${student.codeforces_points ?? 0}</td>
            <td class="lc-col">${student.leetcode_points ?? 0}</td>
            <td class="total-col">${student.total_points ?? 0}</td>
            <td>${student.weekly_points ?? 0}</td>
          </tr>
        `;
      }).join("");

      studentsBody.querySelectorAll(".student-row").forEach((row) => {
        row.addEventListener("click", async () => {
          const userId = row.getAttribute("data-user-id");
          if (!userId) return;

          const isSameUser = adminState.selectedUserId === userId;
          const isPanelVisible = !submissionsPanel.classList.contains("hidden");

          if (isSameUser && isPanelVisible) {
            hideSubmissionsPanel();
            return;
          }

          await loadUserSubmissions(userId);
        });
      });
    }

    function renderSubmissionList(listElement, items, platform) {
      if (!items || items.length === 0) {
        listElement.innerHTML = '<div class="submission-item">NO SUBMISSIONS</div>';
        return;
      }

      listElement.innerHTML = items.map((item) => {
        const problemName = escapeHtml(item.problem_name || "Unknown problem");
        const externalId = escapeHtml(item.external_problem_id || "-");
        const solvedAt = item.solved_at
          ? new Date(item.solved_at).toLocaleString()
          : "-";

        const ratingOrDifficulty = platform === "codeforces"
          ? `Rating: ${item.rating ?? "-"}`
          : `Difficulty: ${escapeHtml(item.difficulty || "-")}`;

        return `
          <div class="submission-item">
            <div class="submission-name">${problemName}</div>
            <div class="submission-meta">
              ID: ${externalId}<br/>
              ${ratingOrDifficulty}<br/>
              Solved: ${escapeHtml(solvedAt)}
            </div>
          </div>
        `;
      }).join("");
    }

    function hideSubmissionsPanel() {
      adminState.selectedUserId = null;
      submissionsPanel.classList.add("hidden");
      submissionsStatus.textContent = "";
      submissionsTitle.textContent = "SELECT A STUDENT TO VIEW SUBMISSIONS";
      submissionsMeta.textContent = "";
      cfSubmissionsList.innerHTML = "";
      lcSubmissionsList.innerHTML = "";
      renderStudents();
    }

    async function loadUserSubmissions(userId) {
      const token = getSessionToken();
      if (!token) return;

      adminState.selectedUserId = userId;
      renderStudents();

      submissionsPanel.classList.remove("hidden");
      submissionsStatus.textContent = "Loading submissions...";
      cfSubmissionsList.innerHTML = "";
      lcSubmissionsList.innerHTML = "";

      if (adminState.submissionsCache[userId]) {
        renderUserSubmissions(adminState.submissionsCache[userId]);
        submissionsStatus.textContent = "Showing cached submissions.";
        return;
      }

      try {
        const payload = await callFunction("admin-user-submissions", {
          method: "POST",
          body: { user_id: userId },
          token,
        });

        adminState.submissionsCache[userId] = payload;
        renderUserSubmissions(payload);
        submissionsStatus.textContent = "Submissions loaded.";
      } catch (error) {
        submissionsStatus.textContent = `${error.message}`;
      }
    }

    function renderUserSubmissions(payload) {
      const name = payload.full_name || "Unknown";
      const semester = payload.semester ?? "-";
      submissionsTitle.textContent = `SUBMISSIONS: ${name} (SEM ${semester})`;
      submissionsMeta.textContent = `CF: ${payload.codeforces_handle || "-"} | LC: ${payload.leetcode_handle || "-"}`;

      renderSubmissionList(cfSubmissionsList, payload.codeforces_submissions || [], "codeforces");
      renderSubmissionList(lcSubmissionsList, payload.leetcode_submissions || [], "leetcode");
    }

    async function loadAdminData() {
      const token = getSessionToken();
      if (!token) {
        showLogin("Sign in from the main login interface.");
        return;
      }

      dashboardStatus.textContent = "Loading student data...";

      try {
        const payload = await callFunction("admin-students-overview", {
          method: "POST",
          body: {},
          token,
        });

        adminState.payload = payload;
        adminState.submissionsCache = {};
        populateSemesterFilter(payload.students || []);
        dashboardStatus.textContent = `Loaded ${payload.total_students ?? 0} student records.`;
        renderStudents();
      } catch (error) {
        clearSession();
        showLogin(`${error.message} Sign in again.`);
      }
    }

    semesterFilter.addEventListener("change", () => {
      adminState.selectedSemester = semesterFilter.value;
      renderStudents();
    });

    searchInput.addEventListener("input", () => {
      adminState.searchQuery = searchInput.value;
      renderStudents();
    });

    document.getElementById("refreshBtn").addEventListener("click", async () => {
      await loadAdminData();
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      clearSession();
      hideSubmissionsPanel();
      showLogin("Logged out.");
    });

    (function init() {
      const savedAdminId = localStorage.getItem(ADMIN_ID_KEY);
      const savedToken = getSessionToken();

      if (!savedAdminId || !savedToken) {
        showLogin("Sign in with admin credentials from the main login screen.");
        return;
      }

      showDashboard(savedAdminId);
      loadAdminData();
    })();
  </script>
</body>
</html>
