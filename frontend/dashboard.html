<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile — CP Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <script>
        if (sessionStorage.getItem("nav_loader") === "1") {
            document.documentElement.classList.add("nav-pending");
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html.nav-pending body > *:not(#navTransitionOverlay):not(#topLoader) {
            opacity: 0 !important;
        }

        body {
            background: #050505;
            color: white;
            font-family: "Fira Code", monospace;
            min-height: 100vh;
        }

        .navbar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 18px 40px;
            border-bottom: 1px solid rgba(0,242,234,0.12);
            background: rgba(5,5,5,0.8);
            gap: 24px;
        }

        .nav-logo {
            color: #00f2ea;
            letter-spacing: 0.12em;
            font-size: 0.9rem;
            flex-shrink: 0;
            justify-self: start;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-tab {
            color: rgba(255,255,255,0.34);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            transition: color 0.25s, border-color 0.25s, box-shadow 0.25s, transform 0.25s;
            border: 1px solid transparent;
            padding: 9px 14px;
            position: relative;
            overflow: hidden;
            background: transparent;
        }

        .nav-tab::before,
        .nav-tab::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .nav-tab::before {
            border-top: 1px solid rgba(0,242,234,0.55);
            border-bottom: 1px solid rgba(0,242,234,0.55);
            transform: scaleX(0.2);
            opacity: 0;
        }

        .nav-tab::after {
            border-left: 1px solid rgba(0,242,234,0.38);
            border-right: 1px solid rgba(0,242,234,0.38);
            transform: scaleY(0.2);
            opacity: 0;
        }

        .nav-tab:hover,
        .nav-tab.active {
            color: #00f2ea;
            border-color: rgba(0,242,234,0.18);
            box-shadow: 0 0 18px rgba(0,242,234,0.08);
            transform: translateY(-1px);
        }

        .nav-tab:hover::before,
        .nav-tab:hover::after,
        .nav-tab.active::before,
        .nav-tab.active::after {
            transform: scale(1);
            opacity: 1;
        }

        .nav-tab-text {
            position: relative;
            z-index: 1;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 16px;
            justify-self: end;
        }

        #displayName { color: #00f2ea; font-size: 0.8rem; letter-spacing: 0.1em; }

        .nav-link {
            color: rgba(255,255,255,0.3);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            transition: color 0.2s;
        }

        .nav-link:hover { color: #ff4d6d; }

        .main {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .section-title {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.3);
            margin-bottom: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(13,13,13,0.92);
            border: 1px solid rgba(0,242,234,0.14);
            padding: 20px 24px;
            position: relative;
            overflow: hidden;
        }

        .card-label {
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            color: rgba(255,255,255,0.3);
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .card-value.cf { color: #f7941e; }
        .card-value.lc { color: #ffa116; }
        .card-value.total { color: #00f2ea; }

        .card-sub {
            margin-top: 6px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.08em;
        }

        .sync-status {
            margin-bottom: 20px;
            font-size: 0.68rem;
            color: rgba(255,255,255,0.38);
            letter-spacing: 0.08em;
        }

        .handles-section { margin-bottom: 40px; }

        .handle-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .handle-row:last-child { border-bottom: none; }

        .handle-platform {
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            width: 140px;
        }

        .handle-platform.cf { color: #f7941e; }
        .handle-platform.lc { color: #ffa116; }

        .handle-name { font-size: 0.85rem; color: rgba(255,255,255,0.8); }

        .empty {
            color: rgba(255,255,255,0.25);
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            padding: 20px 0;
        }

        .add-platform-btn {
            background: none;
            border: 1px solid rgba(0,242,234,0.3);
            color: #00f2ea;
            font-family: "Fira Code", monospace;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            padding: 8px 20px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }

        .add-platform-btn:hover { background: rgba(0,242,234,0.08); }
    </style>
</head>

<body>

    <nav class="navbar" id="appNavbar"></nav>

    <div class="main">
        <div class="sync-status" id="syncStatus">// Checking latest submissions...</div>

        <div class="section-title">// YOUR_STATS</div>
        <div class="cards">
            <div class="card">
                <div class="card-label">// CF_POINTS</div>
                <div class="card-value cf" id="cfPoints">-</div>
                <div class="card-sub" id="cfHandle">-</div>
            </div>
            <div class="card">
                <div class="card-label">// LC_POINTS</div>
                <div class="card-value lc" id="lcPoints">-</div>
                <div class="card-sub" id="lcHandle">-</div>
            </div>
            <div class="card">
                <div class="card-label">// TOTAL_POINTS</div>
                <div class="card-value total" id="totalPoints">-</div>
                <div class="card-sub">LIFETIME</div>
            </div>
        </div>

        <div class="section-title">// LINKED_PLATFORMS</div>
        <div class="handles-section" id="handlesList">
            <div class="empty">// Loading...</div>
        </div>
        <button class="add-platform-btn" onclick="window.location.href='./setup.html'">+ ADD PLATFORM</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./lib/supabase.js"></script>
    <script src="./lib/app-shell.js"></script>

    <script>
        async function init() {
            const appState = await bootstrapAppShell("profile");
            if (!appState) return;

            const { user, accounts, syncResult } = appState;
            const syncStatus = document.getElementById("syncStatus");

            const list = document.getElementById("handlesList");
            if (!accounts || accounts.length === 0) {
                list.innerHTML = '<div class="empty">// No platforms linked yet.</div>';
            } else {
                list.innerHTML = accounts.map(a => `
                    <div class="handle-row">
                        <span class="handle-platform ${a.platform === "codeforces" ? "cf" : "lc"}">
                            ${a.platform === "codeforces" ? "CODEFORCES" : "LEETCODE"}
                        </span>
                        <span class="handle-name">${a.handle}</span>
                    </div>
                `).join("");
            }

            const cfAcc = accounts?.find(a => a.platform === "codeforces");
            const lcAcc = accounts?.find(a => a.platform === "leetcode");
            if (cfAcc) document.getElementById("cfHandle").textContent = cfAcc.handle;
            if (lcAcc) document.getElementById("lcHandle").textContent = lcAcc.handle;

            if (!accounts || accounts.length === 0) {
                syncStatus.textContent = "// Link a platform to start syncing submissions.";
            } else if (syncResult?.errors?.length) {
                syncStatus.textContent = "// Partial refresh completed. Some platforms may still be stale.";
            } else {
                syncStatus.textContent = "// Latest submissions synced.";
            }

            const { data: scores } = await supabase
                .from("user_scores")
                .select("codeforces_points, leetcode_points, total_points, last_updated")
                .eq("user_id", user.id)
                .single();

            if (scores) {
                const computedTotal =
                    (scores.codeforces_points ?? 0) + (scores.leetcode_points ?? 0);

                if (scores.codeforces_points != null)
                    document.getElementById("cfPoints").textContent = scores.codeforces_points;
                if (scores.leetcode_points != null)
                    document.getElementById("lcPoints").textContent = scores.leetcode_points;
                document.getElementById("totalPoints").textContent = computedTotal;
                if (scores.last_updated) {
                    syncStatus.textContent = `// Last synced: ${new Date(scores.last_updated).toLocaleString()}`;
                }
            }
        }

        init();
    </script>

</body>

</html>
