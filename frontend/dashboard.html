<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile — CP Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <script>
        if (sessionStorage.getItem("nav_loader") === "1") {
            document.documentElement.classList.add("nav-pending");
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html.nav-pending body > *:not(#navTransitionOverlay):not(#topLoader) {
            opacity: 0 !important;
        }

        body {
            background: #050505;
            color: white;
            font-family: "Fira Code", monospace;
            min-height: 100vh;
        }

        .navbar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 18px 40px;
            background: rgba(5,5,5,0.8);
            gap: 24px;
        }

        .nav-logo {
            color: #00f2ea;
            letter-spacing: 0.12em;
            font-size: 0.9rem;
            flex-shrink: 0;
            justify-self: start;
        }

        /* Dashboard-only override: swap logo positions in app shell navbar */
        .app-nav-brand .app-nav-logo-c3 { order: 3; }
        .app-nav-brand .app-nav-logo-divider { order: 2; }
        .app-nav-brand .app-nav-logo-nm { order: 1; }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-tab {
            color: rgba(214,234,234,0.78);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            transition: color 0.25s, border-color 0.25s, box-shadow 0.25s, transform 0.25s;
            border: 1px solid transparent;
            padding: 9px 14px;
            position: relative;
            overflow: hidden;
            background: transparent;
            isolation: isolate;
            border-radius: 8px;
        }

        .nav-tab::before,
        .nav-tab::after {
            content: "";
            position: absolute;
            left: 50%;
            pointer-events: none;
            opacity: 0;
        }

        .nav-tab::before {
            top: var(--cube1-top, 6px);
            left: var(--cube1-left, 8px);
            right: var(--cube1-right, auto);
            bottom: var(--cube1-bottom, auto);
            width: var(--cube1-size, 6px);
            height: var(--cube1-size, 6px);
            border-radius: 2px;
            transform: translate(0, 0) scale(0.6);
            background: #00f2ea;
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.55), var(--cube1-extra, 0 0 0 transparent);
            transition: transform 0.3s ease, opacity 0.25s ease;
            z-index: 0;
        }

        .nav-tab::after {
            top: var(--cube2-top, auto);
            bottom: var(--cube2-bottom, 6px);
            right: var(--cube2-right, 8px);
            left: var(--cube2-left, auto);
            width: var(--cube2-size, 6px);
            height: var(--cube2-size, 6px);
            border-radius: 2px;
            transform: translate(0, 0) scale(0.6);
            background: rgba(0, 242, 234, 0.7);
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.45), var(--cube2-extra, 0 0 0 transparent);
            transition: transform 0.3s ease, opacity 0.25s ease;
            z-index: 1;
        }

        .nav-tab:hover,
        .nav-tab.active {
            color: #00f2ea;
            border-color: transparent;
            box-shadow: none;
            transform: translateY(-1px);
        }

        .nav-menu .nav-tab:nth-child(1) {
            --cube1-top: 3px;
            --cube1-left: 6px;
            --cube1-size: 7px;
            --cube2-bottom: 4px;
            --cube2-right: 14px;
            --cube2-size: 5px;
        }

        .nav-menu .nav-tab:nth-child(2) {
            --cube1-top: 4px;
            --cube1-left: auto;
            --cube1-right: 8px;
            --cube1-size: 6px;
            --cube2-top: auto;
            --cube2-bottom: 4px;
            --cube2-left: 10px;
            --cube2-right: auto;
            --cube2-size: 6px;
        }

        .nav-menu .nav-tab:nth-child(3) {
            --cube1-top: 2px;
            --cube1-left: 14px;
            --cube1-size: 6px;
            --cube2-bottom: 9px;
            --cube2-left: 18px;
            --cube2-right: auto;
            --cube2-size: 5px;
            --cube2-extra: 34px 0 0 0 rgba(0, 242, 234, 0.7);
        }

        .nav-menu .nav-tab:nth-child(4) {
            --cube1-top: 8px;
            --cube1-left: 4px;
            --cube1-size: 5px;
            --cube2-top: 3px;
            --cube2-bottom: auto;
            --cube2-right: 6px;
            --cube2-size: 8px;
            --cube1-extra: 40px 18px 0 0 rgba(0, 242, 234, 0.7);
        }

        .nav-menu .nav-tab:nth-child(5) {
            --cube1-top: 11px;
            --cube1-left: 10px;
            --cube1-size: 5px;
            --cube2-bottom: 3px;
            --cube2-right: 16px;
            --cube2-size: 7px;
            --cube1-extra: 28px -6px 0 0 rgba(0, 242, 234, 0.7);
        }

        .nav-menu .nav-tab:nth-child(6) {
            --cube1-top: 4px;
            --cube1-left: auto;
            --cube1-right: 12px;
            --cube1-size: 7px;
            --cube2-bottom: 6px;
            --cube2-left: 8px;
            --cube2-right: auto;
            --cube2-size: 5px;
        }

        .nav-tab:hover::before,
        .nav-tab:hover::after,
        .nav-tab.active::before,
        .nav-tab.active::after {
            opacity: 1;
        }

        .nav-tab:hover::before,
        .nav-tab.active::before {
            transform: scale(1);
        }

        .nav-tab:hover::after,
        .nav-tab.active::after {
            transform: scale(1);
        }

        .nav-tab-text {
            position: relative;
            z-index: 1;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 16px;
            justify-self: end;
        }

        #displayName { color: #00f2ea; font-size: 0.8rem; letter-spacing: 0.1em; }

        .nav-link {
            color: rgba(214,234,234,0.72);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            transition: color 0.2s;
        }

        .nav-link:hover { color: #ff4d6d; }

        .main {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .section-title {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: rgba(238,247,247,0.9);
            margin-bottom: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(13,13,13,0.92);
            border: 1px solid rgba(0,242,234,0.14);
            padding: 20px 24px;
            position: relative;
            overflow: hidden;
        }

        .card-label {
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            color: rgba(238,247,247,0.9);
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .card-value.cf { color: #f7941e; }
        .card-value.lc { color: #ffa116; }
        .card-value.total { color: #00f2ea; }

        .card-sub {
            margin-top: 6px;
            font-size: 0.65rem;
            color: rgba(200,224,224,0.72);
            letter-spacing: 0.08em;
        }

        .sync-status {
            margin-bottom: 20px;
            font-size: 0.68rem;
            color: rgba(238,247,247,0.88);
            letter-spacing: 0.08em;
        }

        .info-columns {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 1px minmax(0, 1fr);
            column-gap: 28px;
            align-items: start;
            margin-bottom: 28px;
        }

        .info-column .handles-section { margin-bottom: 0; }

        .info-divider {
            align-self: stretch;
            background: linear-gradient(
                to bottom,
                rgba(0, 242, 234, 0),
                rgba(0, 242, 234, 0.26) 20%,
                rgba(0, 242, 234, 0.26) 80%,
                rgba(0, 242, 234, 0)
            );
        }

        .handles-section { margin-bottom: 40px; }

        .handle-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .handle-row:last-child { border-bottom: none; }

        .handle-platform {
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            width: 140px;
        }

        .handle-platform.cf { color: #f7941e; }
        .handle-platform.lc { color: #ffa116; }

        #academicInfo .handle-platform {
            color: #ffa116;
        }

        .handle-name { font-size: 0.85rem; color: rgba(255,255,255,0.8); }

        .empty {
            color: rgba(204,226,226,0.72);
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            padding: 20px 0;
        }

        .add-platform-btn {
            background: none;
            border: 1px solid rgba(0,242,234,0.3);
            color: #00f2ea;
            font-family: "Fira Code", monospace;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            padding: 8px 20px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }

        .add-platform-btn:hover { background: rgba(0,242,234,0.08); }

        @media (max-width: 860px) {
            .info-columns {
                grid-template-columns: 1fr;
                row-gap: 14px;
            }

            .info-divider {
                width: 100%;
                min-height: 1px;
                background: linear-gradient(
                    to right,
                    rgba(0, 242, 234, 0),
                    rgba(0, 242, 234, 0.22) 24%,
                    rgba(0, 242, 234, 0.22) 76%,
                    rgba(0, 242, 234, 0)
                );
            }
        }
        /* ── EDIT PROFILE MODAL ─────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .modal-box {
            background: #0d0d0d;
            border: 1px solid rgba(0,242,234,0.25);
            padding: 36px 32px;
            width: min(440px, 92vw);
            box-shadow: 0 0 60px rgba(0,242,234,0.08);
            transform: translateY(16px);
            transition: transform 0.25s;
        }
        .modal-overlay.open .modal-box {
            transform: translateY(0);
        }
        .modal-title {
            color: #00f2ea;
            font-size: 0.85rem;
            letter-spacing: 0.18em;
            margin-bottom: 6px;
        }
        .modal-sub {
            color: rgba(255,255,255,0.3);
            font-size: 0.68rem;
            letter-spacing: 0.05em;
            margin-bottom: 28px;
        }
        .modal-field {
            margin-bottom: 20px;
        }
        .modal-label {
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.35);
            margin-bottom: 6px;
            display: block;
        }
        .modal-input,
        .modal-select {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid rgba(0,242,234,0.25);
            color: white;
            font-family: "Fira Code", monospace;
            font-size: 0.82rem;
            padding: 8px 0;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal-input:focus,
        .modal-select:focus {
            border-color: rgba(0,242,234,0.7);
        }
        .modal-select option { background: #0d0d0d; color: white; }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        .modal-btn {
            flex: 1;
            background: none;
            border: 1px solid rgba(0,242,234,0.3);
            color: #00f2ea;
            font-family: "Fira Code", monospace;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            padding: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal-btn:hover { background: rgba(0,242,234,0.08); }
        .modal-btn.cancel {
            border-color: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.4);
        }
        .modal-btn.cancel:hover { background: rgba(255,255,255,0.04); }
        .modal-msg {
            font-size: 0.65rem;
            letter-spacing: 0.06em;
            margin-top: 12px;
            min-height: 18px;
            text-align: center;
        }
        .modal-msg.ok  { color: #00f2ea; }
        .modal-msg.err { color: #ff4d6d; }
    </style>
</head>

<body>

    <nav class="navbar" id="appNavbar"></nav>

    <div class="main">
        <div id="syncStatus" style="font-size:0.65rem; color:rgba(255,255,255,0.3); margin-bottom:20px; letter-spacing:0.05em;">LOADING SYNC STATUS...</div>

        <div class="section-title">YOUR_STATS</div>
        <div class="cards">
            <div class="card">
                <div class="card-label">CF_RAW</div>
                <div class="card-value cf" id="cfPoints">-</div>
                <div class="card-sub" id="cfHandle">-</div>
            </div>
            <div class="card">
                <div class="card-label">LC_RAW</div>
                <div class="card-value lc" id="lcPoints">-</div>
                <div class="card-sub" id="lcHandle">-</div>
            </div>
            <div class="card">
                <div class="card-label">TOTAL_NORMALIZED_POINTS</div>
                <div class="card-value total" id="totalPoints">-</div>
            </div>
        </div>

        <div class="section-title">QUESTIONS_SOLVED</div>
        <div class="cards">
            <div class="card">
                <div class="card-value cf" id="cfSolvedCount">-</div>
                <div class="card-sub">CODEFORCES</div>
            </div>
            <div class="card">
                <div class="card-value lc" id="lcSolvedCount">-</div>
                <div class="card-sub">LEETCODE</div>
            </div>
            <div class="card">
                <div class="card-value total" id="totalSolvedCount">-</div>
                <div class="card-sub">ALL PLATFORMS</div>
            </div>
        </div>

        <div class="info-columns">
            <div class="info-column">
                <div class="section-title">LINKED_PLATFORMS</div>
                <div class="handles-section" id="handlesList">
                    <div class="empty">Loading...</div>
                </div>
            </div>

            <div class="info-divider" aria-hidden="true"></div>

            <div class="info-column">
                <div class="section-title">ACADEMIC_INFO</div>
                <div class="handles-section" id="academicInfo">
                    <div class="handle-row">
                        <span class="handle-platform">SEMESTER</span>
                        <span class="handle-name" id="semesterValue">-</span>
                    </div>
                    <div class="handle-row">
                        <span class="handle-platform">SAP_ID</span>
                        <span class="handle-name" id="sapIdValue">-</span>
                    </div>
                </div>
            </div>
        </div>

        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:0;">
            <button class="add-platform-btn" style="margin-top:0;" onclick="window.location.href='./setup.html'">+ ADD PLATFORM</button>
            <button class="add-platform-btn" style="margin-top:0;color:rgba(200,224,224,0.8);border-color:rgba(200,224,224,0.2);" onclick="openEditProfile()">✎ EDIT PROFILE</button>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="editProfileModal" onclick="closeEditProfile(event)">
        <div class="modal-box">
            <div class="modal-title">EDIT_PROFILE</div>
            <div class="modal-sub">Update your display name, semester, or SAP ID.</div>

            <div class="modal-field">
                <label class="modal-label" for="epName">DISPLAY_NAME</label>
                <input class="modal-input" id="epName" type="text" placeholder="e.g. John Doe" autocomplete="off">
            </div>

            <div class="modal-field">
                <label class="modal-label" for="epSemester">SEMESTER</label>
                <select class="modal-select" id="epSemester">
                    <option value="">— Select —</option>
                    <option value="1">SEM 1</option>
                    <option value="2">SEM 2</option>
                    <option value="3">SEM 3</option>
                    <option value="4">SEM 4</option>
                    <option value="5">SEM 5</option>
                    <option value="6">SEM 6</option>
                    <option value="7">SEM 7</option>
                    <option value="8">SEM 8</option>
                </select>
            </div>

            <div class="modal-field">
                <label class="modal-label" for="epSapId">SAP_ID</label>
                <input class="modal-input" id="epSapId" type="text" placeholder="e.g. 70000000000" autocomplete="off">
            </div>

            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeEditProfile()">CANCEL</button>
                <button class="modal-btn" id="epSaveBtn" onclick="saveEditProfile()">SAVE</button>
            </div>
            <div class="modal-msg" id="epMsg"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./lib/supabase.js"></script>
    <script src="./lib/app-shell.js"></script>

    <script>
        async function init() {
            const appState = await bootstrapAppShell("profile");
            if (!appState) return;

            const { user, accounts, syncResult, syncPromise } = appState;
            const syncStatus = document.getElementById("syncStatus");

            const { data: profileData } = await supabase
                .from("profiles")
                .select("semester, sap_id")
                .eq("id", user.id)
                .maybeSingle();

            document.getElementById("semesterValue").textContent = Number.isInteger(profileData?.semester)
                ? `SEM ${profileData.semester}`
                : "-";
            document.getElementById("sapIdValue").textContent = profileData?.sap_id?.trim() || "-";

            const applySolvedCounts = ({ cf = 0, lc = 0 }) => {
                document.getElementById("cfSolvedCount").textContent = cf;
                document.getElementById("lcSolvedCount").textContent = lc;
                document.getElementById("totalSolvedCount").textContent = cf + lc;
            };

            const loadSolvedCounts = async () => {
                const [
                    { count: cfCount, error: cfCountError },
                    { count: lcCount, error: lcCountError }
                ] = await Promise.all([
                    supabase
                        .from("submissions")
                        .select("id", { count: "exact", head: true })
                        .eq("user_id", user.id)
                        .eq("platform", "codeforces"),
                    supabase
                        .from("submissions")
                        .select("id", { count: "exact", head: true })
                        .eq("user_id", user.id)
                        .eq("platform", "leetcode")
                ]);

                if (cfCountError || lcCountError) {
                    return;
                }

                applySolvedCounts({
                    cf: cfCount ?? 0,
                    lc: lcCount ?? 0,
                });
            };

            const applyScores = (scores) => {
                if (!scores) return;

                if (scores.cf_raw != null)
                    document.getElementById("cfPoints").textContent = scores.cf_raw;
                if (scores.lc_raw != null)
                    document.getElementById("lcPoints").textContent = scores.lc_raw;
                document.getElementById("totalPoints").textContent = scores.total_points ?? 0;
            };

            const list = document.getElementById("handlesList");
            if (!accounts || accounts.length === 0) {
                list.innerHTML = '<div class="empty">No platforms linked yet.</div>';
            } else {
                list.innerHTML = accounts.map(a => `
                    <div class="handle-row">
                        <span class="handle-platform ${a.platform === "codeforces" ? "cf" : "lc"}">
                            ${a.platform === "codeforces" ? "CODEFORCES" : "LEETCODE"}
                        </span>
                        <span class="handle-name">${a.handle}</span>
                    </div>
                `).join("");
            }

            const cfAcc = accounts?.find(a => a.platform === "codeforces");
            const lcAcc = accounts?.find(a => a.platform === "leetcode");
            if (cfAcc) document.getElementById("cfHandle").textContent = cfAcc.handle;
            if (lcAcc) document.getElementById("lcHandle").textContent = lcAcc.handle;

            if (syncStatus) {
                if (!accounts || accounts.length === 0) {
                    syncStatus.textContent = "Link a platform to start syncing submissions.";
                } else if (syncPromise) {
                    
                } else if (syncResult?.errors?.length) {
                    syncStatus.textContent = "Partial refresh completed. Some platforms may still be stale.";
                } else if (syncResult) {
                    syncStatus.textContent = "Latest submissions synced.";
                } else {
                    syncStatus.textContent = "Showing current stored data.";
                }
            }

            const { data: scores } = await supabase
                .from("user_scores")
                .select("cf_raw, lc_raw, total_points, last_updated")
                .eq("user_id", user.id)
                .single();

            applyScores(scores);
            await loadSolvedCounts();
            if (syncStatus && scores?.last_updated && !syncResult?.errors?.length && !syncPromise) {
                syncStatus.textContent = `Last synced: ${new Date(scores.last_updated).toLocaleString()}`;
            }

            if (syncPromise) {
                const completedSync = await syncPromise;

                if (completedSync?.errors?.length) {
                    if (syncStatus) syncStatus.textContent = "Partial refresh completed. Some platforms may still be stale.";
                    return;
                }

                const { data: refreshedScores } = await supabase
                    .from("user_scores")
                    .select("cf_raw, lc_raw, total_points, last_updated")
                    .eq("user_id", user.id)
                    .single();

                applyScores(refreshedScores);
                await loadSolvedCounts();
                if (syncStatus && refreshedScores?.last_updated) {
                    syncStatus.textContent = `Last synced: ${new Date(refreshedScores.last_updated).toLocaleString()}`;
                }
            }
        }

        init();

        /* ── Edit Profile modal ──────────────────────────────── */
        async function openEditProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;

            const { data: p } = await supabase
                .from('profiles')
                .select('full_name, semester, sap_id')
                .eq('id', user.id)
                .maybeSingle();

            document.getElementById('epName').value = p?.full_name || '';
            document.getElementById('epSemester').value = p?.semester ?? '';
            document.getElementById('epSapId').value = p?.sap_id || '';
            document.getElementById('epMsg').textContent = '';
            document.getElementById('epMsg').className = 'modal-msg';
            document.getElementById('editProfileModal').classList.add('open');
        }

        function closeEditProfile(e) {
            if (e && e.target !== document.getElementById('editProfileModal')) return;
            document.getElementById('editProfileModal').classList.remove('open');
        }

        async function saveEditProfile() {
            const btn = document.getElementById('epSaveBtn');
            const msgEl = document.getElementById('epMsg');
            const name = document.getElementById('epName').value.trim();
            const sem = parseInt(document.getElementById('epSemester').value, 10);
            const sap = document.getElementById('epSapId').value.trim();

            if (!name) {
                msgEl.textContent = 'Display name cannot be empty.';
                msgEl.className = 'modal-msg err';
                return;
            }

            btn.textContent = 'SAVING...';
            btn.disabled = true;

            const { data: { user } } = await supabase.auth.getUser();
            const { error } = await supabase
                .from('profiles')
                .upsert({
                    id: user.id,
                    full_name: name,
                    semester: Number.isNaN(sem) ? null : sem,
                    sap_id: sap || null
                }, { onConflict: 'id' });

            btn.textContent = 'SAVE';
            btn.disabled = false;

            if (error) {
                msgEl.textContent = 'Error: ' + error.message;
                msgEl.className = 'modal-msg err';
                return;
            }

            // Refresh displayed values
            document.getElementById('semesterValue').textContent = Number.isNaN(sem) ? '-' : `SEM ${sem}`;
            document.getElementById('sapIdValue').textContent = sap || '-';

            msgEl.textContent = 'Profile updated!';
            msgEl.className = 'modal-msg ok';
            setTimeout(() => document.getElementById('editProfileModal').classList.remove('open'), 1200);
        }
    </script>

</body>

</html>
