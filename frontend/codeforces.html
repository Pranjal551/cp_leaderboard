<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Codeforces Data — CP Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <script>
        if (sessionStorage.getItem("nav_loader") === "1") {
            document.documentElement.classList.add("nav-pending");
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html.nav-pending body > *:not(#navTransitionOverlay):not(#topLoader) { opacity: 0 !important; }
        body { background: #050505; color: white; font-family: "Fira Code", monospace; min-height: 100vh; }
        .navbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 18px 40px; border-bottom: 1px solid rgba(0,242,234,0.12); background: rgba(5,5,5,0.8); gap: 24px; }
        .nav-logo { color: #00f2ea; letter-spacing: 0.12em; font-size: 0.9rem; flex-shrink: 0; justify-self: start; }
        .nav-menu { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; justify-content: center; }
        .nav-tab { color: rgba(214,234,234,0.78); text-decoration: none; font-size: 0.7rem; letter-spacing: 0.12em; transition: color 0.25s, border-color 0.25s, box-shadow 0.25s, transform 0.25s; border: 1px solid transparent; padding: 9px 14px; position: relative; overflow: hidden; background: transparent; }
        .nav-tab::before, .nav-tab::after { content: ""; position: absolute; inset: 0; pointer-events: none; transition: transform 0.3s ease, opacity 0.3s ease; }
        .nav-tab::before { border-top: 1px solid rgba(0,242,234,0.55); border-bottom: 1px solid rgba(0,242,234,0.55); transform: scaleX(0.2); opacity: 0; }
        .nav-tab::after { border-left: 1px solid rgba(0,242,234,0.38); border-right: 1px solid rgba(0,242,234,0.38); transform: scaleY(0.2); opacity: 0; }
        .nav-tab:hover, .nav-tab.active { color: #00f2ea; border-color: rgba(0,242,234,0.18); box-shadow: 0 0 18px rgba(0,242,234,0.08); transform: translateY(-1px); }
        .nav-tab:hover::before, .nav-tab:hover::after, .nav-tab.active::before, .nav-tab.active::after { transform: scale(1); opacity: 1; }
        .nav-tab-text { position: relative; z-index: 1; }
        .nav-user { display: flex; align-items: center; gap: 16px; justify-self: end; }
        #displayName { color: #00f2ea; font-size: 0.8rem; letter-spacing: 0.1em; }
        .nav-link { color: rgba(214,234,234,0.72); font-size: 0.72rem; letter-spacing: 0.08em; cursor: pointer; border: none; background: none; font-family: inherit; transition: color 0.2s; }
        .nav-link:hover { color: #ff4d6d; }
        .main { max-width: 860px; margin: 0 auto; padding: 48px 24px; }
        .section-title { font-size: 0.7rem; letter-spacing: 0.18em; color: rgba(206,228,228,0.74); margin-bottom: 16px; }
        .summary {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary-card {
            border: 1px solid rgba(247,148,30,0.18);
            background: rgba(13,13,13,0.92);
            padding: 18px 20px;
        }

        .summary-label {
            font-size: 0.72rem;
            letter-spacing: 0.16em;
            color: #00f2ea;
            margin-bottom: 12px;
        }

        .summary-value {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
            color: #f7941e;
        }

        .summary-sub {
            margin-top: 10px;
            font-size: 0.72rem;
            color: rgba(214,234,234,0.78);
            letter-spacing: 0.08em;
        }

        .board-shell {
            border: 1px solid rgba(247,148,30,0.18);
            background: rgba(13,13,13,0.92);
            padding-top: 12px;
        }

        .board-table {
            width: 100%;
            border-collapse: collapse;
        }

        .board-table th {
            text-align: left;
            padding: 10px 18px;
            font-size: 0.58rem;
            letter-spacing: 0.15em;
            color: rgba(206,228,228,0.72);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .board-table td {
            padding: 15px 18px;
            font-size: 0.78rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .problem-name { color: rgba(255,255,255,0.88); }
        .problem-id { color: rgba(214,234,234,0.8); }
        .problem-rating { color: #f7941e; }
        .problem-date { color: rgba(220,240,240,0.82); }

        .empty {
            padding: 24px 18px;
            color: rgba(204,226,226,0.76);
            letter-spacing: 0.08em;
            font-size: 0.72rem;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="appNavbar"></nav>
    <div class="main">
        <div class="section-title">// CODEFORCES_DATA</div>
        <div class="summary">
            <div class="summary-card">
                <div class="summary-label">// HANDLE</div>
                <div class="summary-value" id="cfHandle">N/A</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">// SOLVED_PROBLEMS</div>
                <div class="summary-value" id="cfSolvedCount">0</div>
                <div class="summary-sub">stored in database</div>
            </div>
        </div>

        <div class="board-shell">
            <table class="board-table">
                <thead>
                    <tr>
                        <th>PROBLEM</th>
                        <th>ID</th>
                        <th>RATING</th>
                        <th>SOLVED AT</th>
                    </tr>
                </thead>
                <tbody id="cfSolvedBody">
                    <tr><td colspan="4" class="empty">// LOADING SOLVED PROBLEMS...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./lib/supabase.js"></script>
    <script src="./lib/app-shell.js"></script>
    <script>
        async function init() {
            const appState = await bootstrapAppShell("codeforces");
            if (!appState) return;

            const cfAccount = (appState.accounts || []).find(account => account.platform === "codeforces");
            const body = document.getElementById("cfSolvedBody");

            if (!cfAccount) {
                body.innerHTML = `<tr><td colspan="4" class="empty">// CODEFORCES ACCOUNT NOT LINKED</td></tr>`;
                return;
            }

            document.getElementById("cfHandle").textContent = cfAccount.handle;

            const { data: solvedProblems, error } = await supabase
                .from("submissions")
                .select("solved_at, problems(name, rating, external_problem_id)")
                .eq("user_id", appState.user.id)
                .eq("platform", "codeforces")
                .order("solved_at", { ascending: false });

            if (error || !solvedProblems) {
                body.innerHTML = `<tr><td colspan="4" class="empty">// COULD NOT LOAD CODEFORCES DATA</td></tr>`;
                return;
            }

            document.getElementById("cfSolvedCount").textContent = solvedProblems.length;

            if (solvedProblems.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="empty">// NO CODEFORCES PROBLEMS STORED YET</td></tr>`;
                return;
            }

            body.innerHTML = solvedProblems.map((entry) => `
                <tr>
                    <td class="problem-name">${entry.problems?.name || "-"}</td>
                    <td class="problem-id">${entry.problems?.external_problem_id || "-"}</td>
                    <td class="problem-rating">${entry.problems?.rating ?? "N/A"}</td>
                    <td class="problem-date">${entry.solved_at ? new Date(entry.solved_at).toLocaleString() : "-"}</td>
                </tr>
            `).join("");
        }

        init();
    </script>
</body>
</html>
