<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Leaderboard - CP Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <script>
        if (sessionStorage.getItem("nav_loader") === "1") {
            document.documentElement.classList.add("nav-pending");
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html.nav-pending body > *:not(#navTransitionOverlay):not(#topLoader) { opacity: 0 !important; }
        body { background: #050505; color: white; font-family: "Fira Code", monospace; min-height: 100vh; }
        .navbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 18px 40px; border-bottom: 1px solid rgba(0,242,234,0.12); background: rgba(5,5,5,0.8); gap: 24px; }
        .nav-logo { color: #00f2ea; letter-spacing: 0.12em; font-size: 0.9rem; flex-shrink: 0; justify-self: start; }
        .nav-menu { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; justify-content: center; }
        .nav-tab { color: rgba(214,234,234,0.78); text-decoration: none; font-size: 0.7rem; letter-spacing: 0.12em; transition: color 0.25s, border-color 0.25s, box-shadow 0.25s, transform 0.25s; border: 1px solid transparent; padding: 9px 14px; position: relative; overflow: hidden; background: transparent; }
        .nav-tab::before, .nav-tab::after { content: ""; position: absolute; inset: 0; pointer-events: none; transition: transform 0.3s ease, opacity 0.3s ease; }
        .nav-tab::before { border-top: 1px solid rgba(0,242,234,0.55); border-bottom: 1px solid rgba(0,242,234,0.55); transform: scaleX(0.2); opacity: 0; }
        .nav-tab::after { border-left: 1px solid rgba(0,242,234,0.38); border-right: 1px solid rgba(0,242,234,0.38); transform: scaleY(0.2); opacity: 0; }
        .nav-tab:hover, .nav-tab.active { color: #00f2ea; border-color: rgba(0,242,234,0.18); box-shadow: 0 0 18px rgba(0,242,234,0.08); transform: translateY(-1px); }
        .nav-tab:hover::before, .nav-tab:hover::after, .nav-tab.active::before, .nav-tab.active::after { transform: scale(1); opacity: 1; }
        .nav-tab-text { position: relative; z-index: 1; }
        .nav-user { display: flex; align-items: center; gap: 16px; justify-self: end; }
        #displayName { color: #00f2ea; font-size: 0.8rem; letter-spacing: 0.1em; }
        .nav-link { color: rgba(214,234,234,0.72); font-size: 0.72rem; letter-spacing: 0.08em; cursor: pointer; border: none; background: none; font-family: inherit; transition: color 0.2s; }
        .nav-link:hover { color: #ff4d6d; }

        .nav-tab {
            isolation: isolate;
            border-radius: 8px;
        }

        .nav-tab::before,
        .nav-tab::after {
            content: "";
            position: absolute;
            left: 50%;
            pointer-events: none;
            opacity: 0;
        }

        .nav-tab::before {
            top: var(--cube1-top, 6px);
            left: var(--cube1-left, 8px);
            right: var(--cube1-right, auto);
            bottom: var(--cube1-bottom, auto);
            width: var(--cube1-size, 6px);
            height: var(--cube1-size, 6px);
            border-radius: 2px;
            transform: translate(0, 0) scale(0.6);
            background: #00f2ea;
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.55), var(--cube1-extra, 0 0 0 transparent);
            transition: transform 0.3s ease, opacity 0.25s ease;
            z-index: 0;
        }

        .nav-tab::after {
            top: var(--cube2-top, auto);
            bottom: var(--cube2-bottom, 6px);
            right: var(--cube2-right, 8px);
            left: var(--cube2-left, auto);
            width: var(--cube2-size, 6px);
            height: var(--cube2-size, 6px);
            border-radius: 2px;
            transform: translate(0, 0) scale(0.6);
            background: rgba(0, 242, 234, 0.7);
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.45), var(--cube2-extra, 0 0 0 transparent);
            transition: transform 0.3s ease, opacity 0.25s ease;
            z-index: 1;
        }

        .nav-tab:hover,
        .nav-tab.active {
            color: #00f2ea;
            border-color: transparent;
            box-shadow: none;
            transform: translateY(-1px);
        }

        .nav-tab:hover::before,
        .nav-tab:hover::after,
        .nav-tab.active::before,
        .nav-tab.active::after {
            opacity: 1;
        }

        .nav-tab:hover::before,
        .nav-tab.active::before {
            transform: scale(1);
        }

        .nav-tab:hover::after,
        .nav-tab.active::after {
            transform: scale(1);
        }

        .nav-menu .nav-tab:nth-child(1) {
            --cube1-top: 3px;
            --cube1-left: 6px;
            --cube1-size: 7px;
            --cube2-bottom: 4px;
            --cube2-right: 14px;
            --cube2-size: 5px;
        }

        .nav-menu .nav-tab:nth-child(2) {
            --cube1-top: 4px;
            --cube1-left: auto;
            --cube1-right: 8px;
            --cube1-size: 6px;
            --cube2-top: auto;
            --cube2-bottom: 4px;
            --cube2-left: 10px;
            --cube2-right: auto;
            --cube2-size: 6px;
        }

        .nav-menu .nav-tab:nth-child(3) {
            --cube1-top: 2px;
            --cube1-left: 14px;
            --cube1-size: 6px;
            --cube2-bottom: 9px;
            --cube2-left: 18px;
            --cube2-right: auto;
            --cube2-size: 5px;
            --cube2-extra: 34px 0 0 0 rgba(0, 242, 234, 0.7);
        }

        .nav-menu .nav-tab:nth-child(4) {
            --cube1-top: 8px;
            --cube1-left: 4px;
            --cube1-size: 5px;
            --cube2-top: 3px;
            --cube2-bottom: auto;
            --cube2-right: 6px;
            --cube2-size: 8px;
            --cube1-extra: 40px 18px 0 0 rgba(0, 242, 234, 0.7);
        }

        .nav-menu .nav-tab:nth-child(5) {
            --cube1-top: 11px;
            --cube1-left: 10px;
            --cube1-size: 5px;
            --cube2-bottom: 3px;
            --cube2-right: 16px;
            --cube2-size: 7px;
            --cube1-extra: 28px -6px 0 0 rgba(0, 242, 234, 0.7);
        }

        .nav-menu .nav-tab:nth-child(6) {
            --cube1-top: 4px;
            --cube1-left: auto;
            --cube1-right: 12px;
            --cube1-size: 7px;
            --cube2-bottom: 6px;
            --cube2-left: 8px;
            --cube2-right: auto;
            --cube2-size: 5px;
        }
        .main { max-width: 860px; margin: 0 auto; padding: 48px 24px; }
        .hero { margin-bottom: 24px; }
        .section-title { font-size: 0.7rem; letter-spacing: 0.18em; color: rgba(206,228,228,0.74); margin-bottom: 12px; }
        .hero-title { color: #00f2ea; font-size: 1.4rem; letter-spacing: 0.08em; margin-bottom: 10px; }
        .hero-copy { color: rgba(214,234,234,0.78); font-size: 0.78rem; line-height: 1.7; }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 26px;
        }
        .stat-card {
            border: 1px solid rgba(0,242,234,0.14);
            background: rgba(13,13,13,0.92);
            padding: 16px 18px;
        }
        .stat-label {
            font-size: 0.74rem;
            letter-spacing: 0.16em;
            color: #00f2ea;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: 0.04em;
            color: white;
        }
        .stat-value.cyan { color: #00f2ea; }
        .stat-value.dim { color: rgba(255,255,255,0.72); font-size: 1.18rem; }
        .board-shell {
            border: 1px solid rgba(0,242,234,0.14);
            background: rgba(13,13,13,0.92);
            padding: 12px 0 0;
        }
        .board-table {
            width: 100%;
            border-collapse: collapse;
        }
        .board-table th {
            font-size: 0.58rem;
            letter-spacing: 0.15em;
            color: rgba(206,228,228,0.72);
            text-align: left;
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .board-table th:last-child,
        .board-table td:last-child { text-align: right; }
        .board-table td {
            padding: 16px 20px;
            font-size: 0.78rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .rank {
            color: #00f2ea;
            width: 70px;
        }
        .points { color: #00f2ea; }
        .me-row {
            background:
                linear-gradient(90deg, rgba(0,242,234,0.14), rgba(0,242,234,0.04) 24%, rgba(0,242,234,0.02) 100%);
            box-shadow: inset 3px 0 0 #00f2ea;
        }
        .me-name,
        .me-row .rank,
        .me-row .points {
            color: #00f2ea;
            text-shadow: 0 0 14px rgba(0,242,234,0.24);
        }
        .empty {
            padding: 24px 20px;
            color: rgba(204,226,226,0.74);
            letter-spacing: 0.08em;
            font-size: 0.72rem;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="appNavbar"></nav>
    <div class="main">
        <div class="hero">
            <div class="section-title">// CURRENT_WEEK</div>
            <div class="hero-title">WEEKLY LEADERBOARD</div>
            <div class="hero-copy">Fresh points for the active Sunday-to-Saturday window, ranked across Codeforces and LeetCode solves.</div>
        </div>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">// YOUR_WEEKLY_POINTS</div>
                <div class="stat-value cyan" id="statMyWeekly">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">// WEEK_RANGE</div>
                <div class="stat-value dim" id="statWeekRange">--</div>
            </div>
        </div>
        <div class="board-shell">
            <table class="board-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>HANDLE</th>
                        <th>WEEKLY PTS</th>
                    </tr>
                </thead>
                <tbody id="lbBody">
                    <tr><td colspan="3" class="empty">// LOADING WEEKLY LEADERBOARD...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./lib/supabase.js"></script>
    <script src="./lib/app-shell.js"></script>
    <script>
        async function init() {
            const appState = await bootstrapAppShell("weekly");
            if (!appState) return;

            const myId = appState.user.id;
            const { data, error } = await supabase.functions.invoke("get-weekly-leaderboard");

            const leaderboard = data?.leaderboard || [];
            document.getElementById("statWeekRange").textContent = formatWeekRange(
                data?.week_start,
                data?.week_end
            );

            if (error || !Array.isArray(leaderboard) || leaderboard.length === 0) {
                document.getElementById("statMyWeekly").textContent = "0";
                document.getElementById("lbBody").innerHTML =
                    `<tr><td colspan="3" class="empty">// NO WEEKLY DATA YET - SOLVE SOMETHING THIS WEEK</td></tr>`;
                return;
            }

            const myEntry = leaderboard.find(entry => entry.user_id === myId) || null;
            document.getElementById("statMyWeekly").textContent = String(myEntry?.total_points ?? 0);

            document.getElementById("lbBody").innerHTML = leaderboard.map((entry, index) => {
                const isMe = entry.user_id === myId;
                const rowClass = isMe ? "me-row" : "";
                const nameClass = isMe ? "me-name" : "";

                return `
                    <tr class="${rowClass}">
                        <td class="rank">${String(index + 1).padStart(2, "0")}</td>
                        <td class="${nameClass}">${entry.handle || entry.full_name || "-"}</td>
                        <td class="points">${entry.total_points ?? 0}</td>
                    </tr>
                `;
            }).join("");
        }

        function formatWeekRange(start, end) {
            if (!start || !end) return "--";

            const startDate = new Date(`${start}T00:00:00`);
            const endDate = new Date(`${end}T00:00:00`);
            const sameMonth = startDate.getMonth() === endDate.getMonth();
            const startLabel = startDate.toLocaleDateString(undefined, {
                month: "short",
                day: "numeric",
            });
            const endLabel = endDate.toLocaleDateString(undefined, {
                month: sameMonth ? undefined : "short",
                day: "numeric",
            });

            return `${startLabel} - ${endLabel}`;
        }

        init();
    </script>
</body>
</html>
