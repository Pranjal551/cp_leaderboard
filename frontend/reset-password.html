<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — CP Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --cyan: #00f2ea;
            --bg: #050505;
        }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: white;
            font-family: "Fira Code", monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 420px;
            background: #080c0c;
            border: 1px solid rgba(0,242,234,0.25);
            box-shadow: 0 0 0 1px rgba(0,242,234,0.08), 0 0 40px rgba(0,242,234,0.12);
        }
        .card-head {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(0,242,234,0.14);
            color: var(--cyan);
            letter-spacing: 0.14em;
            font-size: 0.74rem;
        }
        .card-body {
            padding: 28px 30px 24px;
        }
        .title {
            color: var(--cyan);
            font-size: 0.86rem;
            letter-spacing: 0.16em;
            margin-bottom: 10px;
        }
        .sub {
            color: rgba(214,234,234,0.78);
            font-size: 0.72rem;
            line-height: 1.8;
            margin-bottom: 22px;
        }
        .input-group {
            margin-bottom: 22px;
        }
        .input-label {
            display: block;
            margin-bottom: 8px;
            color: rgba(0,242,234,0.7);
            font-size: 0.68rem;
            letter-spacing: 0.14em;
        }
        .input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0,242,234,0.24);
            color: white;
            padding: 12px 0 8px;
            font-family: "Fira Code", monospace;
            font-size: 0.9rem;
            outline: none;
        }
        .btn {
            width: 100%;
            border: none;
            background: var(--cyan);
            color: #000;
            padding: 13px;
            font-family: "Fira Code", monospace;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            cursor: pointer;
        }
        .status {
            margin-top: 16px;
            padding: 12px 14px;
            border: 1px solid rgba(0,242,234,0.18);
            background: rgba(0,242,234,0.05);
            color: #00f2ea;
            font-size: 0.66rem;
            letter-spacing: 0.12em;
            line-height: 1.7;
            min-height: 1em;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-head">[ CP_LEADERBOARD ]</div>
        <div class="card-body">
            <div class="title">RESET_PASSWORD</div>
            <div class="sub">Create a new password for your account.</div>

            <form id="resetForm">
                <div class="input-group">
                    <label class="input-label" for="newPassword">// NEW_PASSWORD</label>
                    <input class="input" id="newPassword" type="password" required>
                </div>
                <div class="input-group">
                    <label class="input-label" for="confirmPassword">// CONFIRM_PASSWORD</label>
                    <input class="input" id="confirmPassword" type="password" required>
                </div>
                <button class="btn" type="submit">UPDATE_PASSWORD</button>
                <div class="status" id="resetStatus">VERIFYING_RECOVERY_LINK</div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./lib/supabase.js"></script>
    <script>
        const resetStatus = document.getElementById("resetStatus");
        let recoveryReady = false;

        supabase.auth.onAuthStateChange((event) => {
            if (event === "PASSWORD_RECOVERY" || event === "SIGNED_IN") {
                recoveryReady = true;
                resetStatus.textContent = "READY_FOR_NEW_PASSWORD";
            }
        });

        setTimeout(async () => {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                recoveryReady = true;
                resetStatus.textContent = "READY_FOR_NEW_PASSWORD";
            } else if (!recoveryReady) {
                resetStatus.textContent = "OPEN_THIS_PAGE_FROM_THE_EMAIL_LINK";
            }
        }, 800);

        document.getElementById("resetForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (newPassword !== confirmPassword) {
                resetStatus.textContent = "PASSWORDS_DO_NOT_MATCH";
                return;
            }

            if (!recoveryReady) {
                resetStatus.textContent = "RECOVERY_SESSION_NOT_READY";
                return;
            }

            const { error } = await supabase.auth.updateUser({ password: newPassword });

            if (error) {
                resetStatus.textContent = error.message.toUpperCase().replace(/\s+/g, "_");
                return;
            }

            resetStatus.textContent = "PASSWORD_UPDATED";
            alert("Password updated successfully. Please log in with your new password.");
            await supabase.auth.signOut();
            window.location.href = "./index.html";
        });
    </script>
</body>
</html>
